{{- if .Values.scalingController.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hami-scaling-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: hami
    app.kubernetes.io/component: scaling-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hami-scaling-controller
  labels:
    app.kubernetes.io/name: hami
    app.kubernetes.io/component: scaling-controller
rules:
  - apiGroups: ["hami.io"]
    resources: ["vgpuscalings"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["hami.io"]
    resources: ["vgpuscalings/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hami-scaling-controller
  labels:
    app.kubernetes.io/name: hami
    app.kubernetes.io/component: scaling-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hami-scaling-controller
subjects:
  - kind: ServiceAccount
    name: hami-scaling-controller
    namespace: {{ .Release.Namespace }}
{{- end }}
