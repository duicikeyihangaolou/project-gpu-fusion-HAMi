{{- if .Values.scalingController.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hami-scaling-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: hami
    app.kubernetes.io/component: scaling-controller
spec:
  replicas: {{ .Values.scalingController.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: hami
      app.kubernetes.io/component: scaling-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hami
        app.kubernetes.io/component: scaling-controller
    spec:
      serviceAccountName: hami-scaling-controller
      containers:
        - name: scaling-controller
          image: "{{ .Values.scalingController.image.repository }}:{{ .Values.scalingController.image.tag }}"
          imagePullPolicy: {{ .Values.scalingController.image.pullPolicy | default "IfNotPresent" }}
          args:
            - --v={{ .Values.scalingController.logLevel | default 3 }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      {{- with .Values.scalingController.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scalingController.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
